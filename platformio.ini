[env:4d_systems_esp32s3_gen4_r8n16]
platform = espressif32
board = 4d_systems_esp32s3_gen4_r8n16
framework = arduino
monitor_speed = 115200
upload_port = /dev/cu.usbserial-1440
;upload_speed = 460800
upload_protocol = esptool
board_upload.use_1200bps_touch = yes
board_upload.wait_for_upload_port = yes
board_upload.require_upload_port = yes

monitor_filters = esp32_exception_decoder

; Flash 16MB ve PSRAM ayarlari (N16R8)
board_build.arduino.memory_type = qio_opi 
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv

; Kullanilacak Kutuphaneler
lib_deps =
  bodmer/TFT_eSPI @ ^2.5.43
  file:///Users/ysrmacbook/Documents/Arduino/libraries/ESP32-vs1053_ext
  https://github.com/PaulStoffregen/XPT2046_Touchscreen.git
  bblanchon/ArduinoJson @ ^6.21.3

; TFT_eSPI icin bagimsiz build flag konfigürasyonu
build_flags =
  -D ARDUINO_USB_MODE=1
  -D ARDUINO_USB_CDC_ON_BOOT=1
  -DBOARD_HAS_PSRAM
  
  -DUSER_SETUP_LOADED=1
  -DILI9341_DRIVER=1
  -DTFT_WIDTH=240
  -DTFT_HEIGHT=320
  
  -DTFT_MOSI=45
  -DTFT_MISO=46
  -DTFT_SCLK=3
  -DTFT_CS=14
  -DTFT_DC=47
  -DTFT_RST=21
  -DTFT_BL=-1
  -DTFT_BACKLIGHT_ON=HIGH
  
  -DLOAD_GLCD=1
  -DLOAD_FONT2=1
  -DLOAD_FONT4=1
  -DLOAD_FONT7=1
  -DSPI_FREQUENCY=40000000
  -DUSE_HSPI_PORT

 ; SD Kart Pinleri
  -DSD_CS=17
  -DSD_MOSI=18
  -DSD_MISO=19
  -DSD_SCK=20